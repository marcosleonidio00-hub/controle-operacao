kind = "web"
previewPath = "/"
title = "Controle da Operação"
version = "1.0.0"
id = "artifacts/controle-operacao"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21384

[services.development]
run = "pnpm --filter @workspace/controle-operacao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/controle-operacao", "run", "build" ]
publicDir = "artifacts/controle-operacao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21384"
BASE_PATH = "/"
